<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Werwolf – Spielfeld</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');
:root {
  --gold:#d4a843; --gold-light:#f0c96a; --red:#dc2626; --red-dark:#7f1d1d;
  --green:#16a34a; --blue:#2563eb;
  --glass-night:rgba(255,255,255,0.06); --border-night:rgba(255,255,255,0.12);
  --text-night:#f8fafc; --shadow:0 25px 60px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Crimson Pro',Georgia,serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;transition:background 1.4s;color:var(--text-night)}
body.night{background:radial-gradient(ellipse at 20% 0%,#1e1b4b 0%,#020617 40%,#0f0a00 100%)}
body.day{background:radial-gradient(ellipse at 80% 0%,#0ea5e9 0%,#0c4a6e 40%,#082f49 100%)}
body.transition-overlay::after{content:'';position:fixed;inset:0;z-index:9999;background:#000;animation:fadeInOut 1.2s ease forwards}
@keyframes fadeInOut{0%{opacity:0}40%{opacity:1}100%{opacity:0}}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1px 1px at 25% 40%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 40% 8%,rgba(255,255,255,.9) 0%,transparent 100%),radial-gradient(1px 1px at 55% 30%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 70% 18%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 85% 5%,rgba(255,255,255,.8) 0%,transparent 100%),radial-gradient(1px 1px at 92% 45%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 15% 65%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 60% 55%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 78% 70%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 32% 80%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 50% 90%,rgba(255,255,255,.4) 0%,transparent 100%);opacity:1;transition:opacity 1.4s}
body.day .stars{opacity:0}
 
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;backdrop-filter:blur(20px);background:rgba(0,0,0,.45);border-bottom:1px solid rgba(255,255,255,.1);gap:10px;flex-wrap:wrap}
.phase-badge{display:flex;align-items:center;gap:10px;font-family:'Cinzel',serif;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold-light);text-shadow:0 0 20px rgba(212,168,67,.6)}
.phase-icon{font-size:1.5rem;animation:pulsate 3s ease-in-out infinite}
@keyframes pulsate{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.stats-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.stat-chip{padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);font-family:'Cinzel',serif;font-size:0.72rem;font-weight:600;letter-spacing:1px;color:#e2e8f0;white-space:nowrap}
.stat-chip.wolves{color:#fca5a5;border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.1)}
.stat-chip.alive{color:#86efac;border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.1)}
.stat-chip.night-c{color:var(--gold-light);border-color:rgba(212,168,67,.4);background:rgba(212,168,67,.1)}
.topbar-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-tiny{padding:6px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#e2e8f0;font-family:'Cinzel',serif;font-size:0.7rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-tiny:hover{background:rgba(255,255,255,.18);transform:translateY(-1px)}
.btn-tiny.danger{border-color:rgba(220,38,38,.5);color:#fca5a5;background:rgba(220,38,38,.1)}
.btn-tiny.danger:hover{background:rgba(220,38,38,.25)}
.btn-tiny.gold{border-color:rgba(212,168,67,.5);color:var(--gold-light);background:rgba(212,168,67,.1)}
.btn-tiny.gold:hover{background:rgba(212,168,67,.25)}
.btn-tiny.green-btn{border-color:rgba(34,197,94,.5);color:#86efac;background:rgba(34,197,94,.1)}
.btn-tiny.green-btn:hover{background:rgba(34,197,94,.25)}
.btn-tiny.purple-btn{border-color:rgba(168,85,247,.5);color:#d8b4fe;background:rgba(168,85,247,.1)}
.btn-tiny.purple-btn:hover{background:rgba(168,85,247,.25)}
.btn-tiny:disabled{opacity:.4;cursor:not-allowed;transform:none}
 
/* MAIN */
.game-wrap{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:24px 16px 20px;position:relative;z-index:1}
.instruction-card{background:rgba(0,0,0,.35);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:24px 28px;text-align:center;margin-bottom:22px;box-shadow:var(--shadow);animation:slideUp .5s ease-out;position:relative;overflow:hidden}
.instruction-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.instruction-card h2{font-family:'Cinzel Decorative',serif;font-size:1.4rem;font-weight:700;color:var(--gold-light);text-shadow:0 0 30px rgba(212,168,67,.5);margin-bottom:8px;letter-spacing:1px}
.instruction-card p{font-size:1rem;color:rgba(255,255,255,.75);font-style:italic}
.role-tag{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-family:'Cinzel',serif;font-size:0.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.role-tag.wolf{background:rgba(220,38,38,.2);border:1px solid rgba(220,38,38,.5);color:#fca5a5}
.role-tag.village{background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.5);color:#86efac}
.role-tag.neutral{background:rgba(168,85,247,.2);border:1px solid rgba(168,85,247,.5);color:#d8b4fe}
.role-tag.special{background:rgba(212,168,67,.15);border:1px solid rgba(212,168,67,.4);color:var(--gold-light)}
 
/* PLAYER GRID */
.player-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-bottom:22px;animation:slideUp .5s ease-out .1s both}
.player-card{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.12);border-radius:18px;padding:18px 12px 14px;text-align:center;cursor:pointer;transition:all .25s cubic-bezier(.175,.885,.32,1.275);position:relative;min-width:130px;max-width:155px;flex:1 1 130px;user-select:none}
.player-card:hover:not(.dead):not(.no-click){transform:scale(1.06) translateY(-4px);background:rgba(255,255,255,.12);border-color:var(--gold);box-shadow:0 12px 30px rgba(0,0,0,.5),0 0 20px rgba(212,168,67,.2)}
.player-card.selected{border-color:var(--gold-light)!important;background:rgba(212,168,67,.15)!important;box-shadow:0 0 25px rgba(212,168,67,.4),0 12px 30px rgba(0,0,0,.4);transform:scale(1.04) translateY(-2px)}
.player-card.voted{border-color:#ef4444!important;background:rgba(239,68,68,.12)!important}
.player-card.dead{opacity:.22;filter:grayscale(1) blur(.5px);pointer-events:none;border-color:rgba(255,255,255,.05)!important}
.player-card.no-click{cursor:default}
.vote-badge{position:absolute;top:-8px;right:-8px;width:26px;height:26px;border-radius:50%;background:#dc2626;border:2px solid rgba(0,0,0,.5);color:white;font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;animation:popIn .3s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.shield-badge{position:absolute;top:-8px;left:-8px;font-size:1.1rem;animation:popIn .3s ease}
.avatar-circle{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1e3a5f,#0f172a);border:2px solid rgba(212,168,67,.4);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel Decorative',serif;font-size:1.2rem;font-weight:700;color:var(--gold-light);box-shadow:0 4px 12px rgba(0,0,0,.4);transition:all .3s}
.player-card:hover:not(.dead) .avatar-circle{border-color:var(--gold-light);box-shadow:0 4px 20px rgba(212,168,67,.3)}
.player-card.selected .avatar-circle{border-color:var(--gold-light);background:linear-gradient(135deg,#2d1b00,#1a1000);box-shadow:0 0 16px rgba(212,168,67,.5)}
.player-name{font-family:'Cinzel',serif;font-size:.8rem;font-weight:600;letter-spacing:.5px;color:#e2e8f0;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-role-hint{font-size:1.6rem;color:rgba(255,255,255,.75);line-height:1.2;margin-top:4px}
.action-card{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.12);border-radius:18px;padding:18px 12px 14px;text-align:center;cursor:pointer;transition:all .25s cubic-bezier(.175,.885,.32,1.275);min-width:130px;max-width:155px;flex:1 1 130px}
.action-card:hover{transform:scale(1.06) translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.5)}
 
/* VOTE */
.vote-section{background:rgba(0,0,0,.3);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:18px 20px;margin-bottom:18px;animation:slideUp .4s ease-out}
.vote-section h3{font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.vote-tally{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.vote-entry{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:10px;background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);font-size:.85rem}
.vote-entry .ve-name{font-family:'Cinzel',serif;font-size:.75rem;font-weight:600;color:#fca5a5}
.vote-entry .ve-count{font-family:'Cinzel',serif;font-size:.88rem;font-weight:700;color:#ef4444}
.vote-buttons{display:flex;gap:10px;flex-wrap:wrap}
.btn-vote-confirm{padding:9px 20px;border-radius:12px;border:1px solid rgba(220,38,38,.5);background:rgba(220,38,38,.2);color:#fca5a5;font-family:'Cinzel',serif;font-size:.8rem;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s}
.btn-vote-confirm:hover{background:rgba(220,38,38,.4);transform:translateY(-1px)}
.btn-vote-confirm:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-vote-clear{padding:9px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);font-family:'Cinzel',serif;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-vote-clear:hover{background:rgba(255,255,255,.12)}
.btn-vote-skip{padding:9px 16px;border-radius:12px;border:1px solid rgba(212,168,67,.35);background:rgba(212,168,67,.08);color:var(--gold-light);font-family:'Cinzel',serif;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-vote-skip:hover{background:rgba(212,168,67,.2)}
 
/* DAY ACTIONS BAR */
.day-actions{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;animation:slideUp .3s ease}
.day-actions-label{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-right:4px;white-space:nowrap}
.btn-day-action{padding:8px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:#e2e8f0;font-family:'Cinzel',serif;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-day-action:hover{background:rgba(255,255,255,.14);transform:translateY(-1px)}
.btn-day-action:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-day-action.used{opacity:.25;cursor:not-allowed;text-decoration:line-through}
 
/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px);animation:modalFadeIn .25s ease}
.modal-overlay.active{display:flex}
@keyframes modalFadeIn{from{opacity:0}to{opacity:1}}
.modal-card{background:#0f172a;border:1px solid rgba(212,168,67,.3);border-radius:24px;padding:36px 30px;width:100%;max-width:500px;text-align:center;box-shadow:0 0 80px rgba(0,0,0,.8),0 0 40px rgba(212,168,67,.1);animation:modalSlideIn .35s cubic-bezier(.175,.885,.32,1.275);position:relative;overflow:hidden}
.modal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
@keyframes modalSlideIn{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-icon{font-size:3.5rem;margin-bottom:10px;line-height:1}
.modal-label{font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:5px}
.modal-title{font-family:'Cinzel Decorative',serif;font-size:1.4rem;font-weight:700;color:var(--gold-light);text-shadow:0 0 30px rgba(212,168,67,.5);margin-bottom:14px;line-height:1.2}
.modal-body{font-size:.95rem;color:rgba(255,255,255,.75);line-height:1.6;margin-bottom:24px;max-height:48vh;overflow-y:auto;text-align:left}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:rgba(212,168,67,.4);border-radius:4px}
.modal-btn{width:100%;padding:13px;border-radius:14px;border:1px solid rgba(212,168,67,.4);background:rgba(212,168,67,.15);color:var(--gold-light);font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:6px}
.modal-btn:hover{background:rgba(212,168,67,.3);transform:translateY(-1px)}
.modal-btn-2{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.65)}
.modal-btn-2:hover{background:rgba(255,255,255,.12)}
.night-report-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;margin-bottom:7px;font-size:.92rem;text-align:left}
.nri-death{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#fca5a5}
.nri-safe{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac}
.nri-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#93c5fd}
.nri-gold{background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);color:var(--gold-light)}
 
/* WIN SCREEN */
.win-card{position:relative;overflow:hidden}
.win-card.village-win{background:linear-gradient(135deg,#052e16,#065f46,#0f172a);border-color:rgba(52,211,153,.5)}
.win-card.wolf-win{background:linear-gradient(135deg,#450a0a,#7f1d1d,#0f172a);border-color:rgba(239,68,68,.5)}
.win-title{font-family:'Cinzel Decorative',serif;font-size:1.7rem;font-weight:900;letter-spacing:2px;margin-bottom:5px;line-height:1.1}
.win-title.village{color:#6ee7b7;text-shadow:0 0 30px rgba(52,211,153,.6)}
.win-title.wolf{color:#fca5a5;text-shadow:0 0 30px rgba(239,68,68,.6)}
.win-subtitle{font-size:.95rem;color:rgba(255,255,255,.55);font-style:italic;margin-bottom:18px}
.win-overview{max-height:40vh;overflow-y:auto;margin-bottom:18px;border:1px solid rgba(255,255,255,.1);border-radius:12px}
.win-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.06);font-size:.85rem;gap:8px}
.win-row:last-child{border-bottom:none}
.win-row .wr-name{font-family:'Cinzel',serif;font-size:.78rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.win-row .wr-role{color:var(--gold);font-size:.8rem;flex:1;text-align:center}
.win-row .wr-alive{font-size:.95rem;flex:0 0 auto}
.win-btn{width:100%;padding:13px;border-radius:14px;font-family:'Cinzel Decorative',serif;font-size:.85rem;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .2s;border:none}
.win-btn.village{background:linear-gradient(135deg,#059669,#10b981);color:white}
.win-btn.wolf{background:linear-gradient(135deg,#dc2626,#ef4444);color:white}
.win-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
 
/* NIGHT ORDER BAR */
.night-order-bar{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin-bottom:18px;animation:slideUp .4s ease-out}
.nob-step{padding:4px 10px;border-radius:20px;font-family:'Cinzel',serif;font-size:.62rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.25);transition:all .4s;display:flex;align-items:center;gap:4px}
.nob-step.done{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.35);color:#4ade80}
.nob-step.active{background:rgba(212,168,67,.15);border-color:rgba(212,168,67,.5);color:var(--gold-light);box-shadow:0 0 12px rgba(212,168,67,.2)}
 
/* LOG */
.log-panel{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 18px;margin-bottom:14px;max-height:160px;overflow-y:auto}
.log-panel::-webkit-scrollbar{width:4px}
.log-panel::-webkit-scrollbar-thumb{background:rgba(212,168,67,.3);border-radius:4px}
.log-entry{font-size:.8rem;color:rgba(255,255,255,.5);padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:baseline;gap:6px}
.log-entry:last-child{border-bottom:none}
.log-entry .log-time{font-size:.7rem;color:rgba(255,255,255,.25);white-space:nowrap;flex-shrink:0}
.log-entry.log-death{color:#fca5a5}
.log-entry.log-action{color:var(--gold)}
.log-entry.log-day{color:#93c5fd}
 
/* CONFIRM BANNER */
.confirm-banner{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.4);border-radius:14px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;animation:slideUp .3s ease-out}
.confirm-banner p{font-family:'Cinzel',serif;font-size:.85rem;color:#fca5a5}
.confirm-banner .cb-btns{display:flex;gap:8px}
 
/* ADMIN ROWS */
.admin-row{display:flex;justify-content:space-between;align-items:center;padding:9px 6px;border-bottom:1px solid rgba(255,255,255,.07);font-size:.88rem;text-align:left}
.admin-row:last-child{border-bottom:none}
.admin-row .ar-name{font-family:'Cinzel',serif;font-size:.8rem;font-weight:600;color:#e2e8f0}
.admin-row .ar-role{color:var(--gold);font-style:italic;font-size:.82rem}
.admin-row .ar-status{font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;letter-spacing:1px}
.ar-status.alive{color:#4ade80}
.ar-status.dead{color:#f87171}
 
footer{position:relative;z-index:1;text-align:center;padding:16px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.4);backdrop-filter:blur(10px)}
footer p{font-family:'Cinzel',serif;font-size:.68rem;color:rgba(255,255,255,.25);letter-spacing:1px}
footer p span{color:var(--gold);opacity:.6}
 
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .4s ease}
 
@media(max-width:600px){
  .topbar{padding:8px 12px}
  .game-wrap{padding:14px 10px}
  .player-card{min-width:105px;max-width:125px;padding:14px 8px 10px}
  .avatar-circle{width:44px;height:44px;font-size:1rem}
  .modal-card{padding:24px 16px}
  .instruction-card{padding:18px 16px}
}
</style>
</head>
<body class="night">
<div class="stars"></div>
 
<header class="topbar">
  <div class="phase-badge">
    <span class="phase-icon" id="phaseIcon">🌙</span>
    <span id="phaseText">Nacht 1</span>
  </div>
  <div class="stats-row">
    <div class="stat-chip alive" id="statAlive">👥 – Spieler</div>
    <div class="stat-chip wolves" id="statWolves">🐺 – Wölfe</div>
    <div class="stat-chip night-c" id="statNight">Runde –</div>
  </div>
  <div class="topbar-actions">

  execution:     { icon:"⚖️", text:"Die Person wird hingerichtet und ihre Rolle enthüllt. Jetzt können Sondereffekte ausgelöst werden (Hunter, Tanner, Assassin Wolf...). Prüfe das Display." }
};

function showBeginnerTip(key, callback) {
  if (!beginnerMode) { if (callback) callback(); return; }
  const tip = BEGINNER_TIPS[key];
  if (!tip) { if (callback) callback(); return; }
  showModal(tip.icon || "🎓", "SPIELLEITER-TIPP", "",
    `<div class="night-report-item nri-info" style="text-align:left;line-height:1.8;font-size:.95rem;">${tip.text}</div>`,
    callback
  );
}

function demoPlayers() {
  const names = ["Anna","Ben","Clara","David","Eva","Frank","Greta","Hans","Iris","Jan"];
  const roles = ["Werwolf","Werwolf","Seher","Hexe","Hunter","Bodyguard","Dorfbewohner","Dorfbewohner","Dorfbewohner","Dorfbewohner"];

  return names.map((n,i) => ({name:n, role:roles[i], alive:true}));

/* ============================================================
   HELPERS
============================================================ */
function ri(role) { return ROLE_INFO[role] || {team:"village",icon:"❓",color:"village"}; }
function isWolf(p) {
  const wolfRoles = ["Werwolf","Assassin Wolf","Count Lycanthrope","Den Mother","Kamikaze Wolf","Mama Wolf",
    "Mountain Wolf","Mystery Wolf","Mystic Wolf","Oracle Wolf","Outsider Wolf","Pet Wolf",
    "Sorcerer Wolf","Starving Wolf","The Cloak","Wolf Cub","Sorceress","Warlock","Mummer",
    "Eye of the Seer","Illusionist","Spawn","Apprentice Illusionist"];
  if (wolfRoles.includes(p.role)) return true;
  // Investigator who picked a group with no wolf → secretly supports wolves
  if (p.role === "Investigator" && investigatorTeam === "wolf") return true;
  return false;
}
function hasAliveRole(r) { return players.some(p => p.alive && p.role === r); }
function getAlive(r) { return players.filter(p => p.alive && (!r || p.role === r)); }
function isWolfRole(r) { return ri(r).team === "wolf"; }
function isVillageTeam(p) { return !isWolf(p); }
 
function aliveWolfCount() { return players.filter(p => p.alive && isWolf(p)).length; }
function aliveVillageCount() { return players.filter(p => p.alive && !isWolf(p)).length; }
 
function log(msg, type="info") {
  const now = new Date();
  const t = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
  gameLog.unshift({msg, type, t});
  renderLog();
}
function renderLog() {
  const panel = document.getElementById("logPanel");
  if (!logVisible) return;
  panel.innerHTML = gameLog.slice(0,50).map(e =>
    `<div class="log-entry log-${e.type}"><span class="log-time">${e.t}</span><span>${e.msg}</span></div>`
  ).join("");
}
function toggleLog() {
  logVisible = !logVisible;
  document.getElementById("logPanel").style.display = logVisible ? "block" : "none";
  if (logVisible) renderLog();
}
function updateTopBar() {
  const alive = players.filter(p => p.alive).length;
  const wolves = players.filter(p => p.alive && isWolf(p)).length;
  document.getElementById("statAlive").textContent = `👥 ${alive} Spieler`;
  document.getElementById("statWolves").textContent = `🐺 ${wolves} Wölfe`;
  document.getElementById("statNight").textContent = `Runde ${nightCount}`;
  // Anfänger-Modus Badge
  const existing = document.getElementById("beginnerBadge");
  if (beginnerMode && !existing) {
    const badge = document.createElement("div");
    badge.id = "beginnerBadge";
    badge.style.cssText = "position:fixed;top:8px;right:8px;z-index:999;background:rgba(168,85,247,0.85);color:#fff;font-size:0.65rem;font-family:'Cinzel',serif;letter-spacing:1px;padding:4px 10px;border-radius:20px;";
    badge.textContent = "🎓 Anfänger";
    document.body.appendChild(badge);
  } else if (!beginnerMode && existing) {
    existing.remove();
  }
}
function setInstruction(title, desc, tagType, tagLabel) {
  document.getElementById("turnTitle").textContent = title;
  document.getElementById("turnDesc").textContent = desc;
  const tagDiv = document.getElementById("roleTagDisplay");
  tagDiv.innerHTML = (tagType && tagLabel)
    ? `<div class="role-tag ${tagType}">● ${tagLabel}</div>` : "";
}
 
function updateNightBar() {
  const bar = document.getElementById("nightOrderBar");
  bar.innerHTML = nightQueue.map((step,i) => {
    const cls = nightQueueDone.includes(i) ? "done" : (i === nightQueueDone.length ? "active" : "");
    return `<div class="nob-step ${cls}">${step.icon} ${step.label}</div>`;
  }).join("");
}
 
/* ============================================================
   NIGHT CYCLE – QUEUE BUILDER
============================================================ */
function buildNightQueue() {
  const q = [];

  // ══════════════════════════════════════════════════════════════
  // PHASE 1 – NACHT-1-EINMALIG: Rollen die sich nur in Nacht 1
  //           gegenseitig kennenlernen oder ihre Ziele wählen
  // ══════════════════════════════════════════════════════════════
  // Mystery Wolf: erzeugt Lycans in Nacht 2 und Nacht 3
  if (nightCount === 2 || nightCount === 3) {
    const mysteryW = players.find(p => p.alive && p.role === "Mystery Wolf");
    if (mysteryW) q.push({id:"mystery_wolf_lycan", label:"Mystery Wolf", icon:"❓", fn: () => phase_MysteryWolfLycan(mysteryW)});
  }

  if (nightCount === 1) {
    // Wolf-interne Sonderfälle: Außenseiter & Verstärker kennenlernen
    const outsider = players.find(p => p.alive && p.role === "Outsider Wolf");
    if (outsider) q.push({id:"outsider_note", label:"Outsider Wolf", icon:"🌲", fn: () => phase_OutsiderNote(outsider)});
    const mamaW = players.find(p => p.alive && p.role === "Mama Wolf");
    if (mamaW) q.push({id:"mama_wolf_n1", label:"Mama Wolf", icon:"🐺", fn: () => phase_MamaWolfN1(mamaW)});
    const mountainW = players.find(p => p.alive && p.role === "Mountain Wolf");
    if (mountainW) q.push({id:"mountain_wolf_n1", label:"Mountain Wolf", icon:"🏔️", fn: () => phase_MountainWolfN1(mountainW)});
    const oracleW = players.find(p => p.alive && p.role === "Oracle Wolf");
    if (oracleW) q.push({id:"oracle_wolf_n1", label:"Oracle Wolf", icon:"🌕", fn: () => phase_OracleWolfN1(oracleW)});
    // Pet Wolf wählt Besitzer in Nacht 1
    const petWolf = players.find(p => p.alive && p.role === "Pet Wolf");
    if (petWolf) q.push({id:"pet_wolf_n1", label:"Pet Wolf", icon:"🦴", fn: () => phase_PetWolfN1(petWolf)});
    // Dorf-Bruderschaften kennenlernen
    if (hasAliveRole("Masons"))   q.push({id:"masons_n1",   label:"Masons",      icon:"🤝", fn: () => phase_MasonsN1()});
    if (hasAliveRole("Gemini"))   q.push({id:"gemini_n1",   label:"Gemini",      icon:"♊",  fn: () => phase_GeminiN1()});
    // Neutrale Zielvergabe in Nacht 1
    if (hasAliveRole("Assassin")) q.push({id:"assassin_n1", label:"Assassin",    icon:"🗡️", fn: () => phase_AssassinN1()});
    if (hasAliveRole("Copycat"))  q.push({id:"copycat_n1",  label:"Copycat",     icon:"🐱", fn: () => phase_CopycatN1()});
    // Einmalige Dorf-Infos Nacht 1
    if (hasAliveRole("Wise Old Man"))  q.push({id:"wom_n1",       label:"Wise Old Man",  icon:"👴", fn: () => phase_WiseOldManN1()});
    if (hasAliveRole("Savant"))        q.push({id:"savant_n1",    label:"Savant",         icon:"🧠", fn: () => phase_SavantN1()});
    if (hasAliveRole("Count Lycanthrope")) q.push({id:"count_lyc", label:"Count Lyc.",   icon:"🧛", fn: () => phase_CountLycanN1()});
    if (hasAliveRole("Soothsayer"))    q.push({id:"soothsayer_n1",label:"Soothsayer",     icon:"🌟", fn: () => phase_SoothsayerN1()});
    if (hasAliveRole("Investigator"))  q.push({id:"investigator_n1", label:"Investigator",icon:"🔎", fn: () => phase_InvestigatorN1()});
    if (hasAliveRole("The Cloak"))     q.push({id:"cloak_n1",     label:"The Cloak",      icon:"🧥", fn: () => phase_CloakN1()});
  }

  // Insomniac: jede Nacht – beobachtet Rollenwechsel
  if (hasAliveRole("Insomniac")) q.push({id:"insomniac", label:"Insomniac", icon:"😴", fn: () => phase_Insomniac()});

  // Blind Mary (lebt): Moderator-Erinnerung – sie darf nicht sprechen
  const blindMaryAlive = players.find(p => p.alive && p.role === "Blind Mary");
  if (blindMaryAlive) q.push({id:"blind_mary_alive", label:"Blind Mary", icon:"🙈", fn: () => phase_BlindMaryAlive(blindMaryAlive)});

  // Outsider Wolf jagt alleine (jede Nacht bis er dem Rudel beitritt)
  const outsiderAlone = players.find(p => p.alive && p.role === "Outsider Wolf" && !outsiderWolfJoined);
  if (outsiderAlone) q.push({id:"outsider_hunt", label:"Outsider Wolf", icon:"🌲", fn: () => phase_OutsiderWolfHunt(outsiderAlone)});

  // Pet Wolf wählt Besitzer nur in Nacht 1 (einmalig)

  // ══════════════════════════════════════════════════════════════
  // PHASE 2 – AUFKLÄRUNG: Dorf-Seher & Info-Rollen schauen zuerst,
  //           damit die Info noch vor dem Angriff gesammelt wird
  // ══════════════════════════════════════════════════════════════
  const seer  = players.find(p => p.alive && p.role === "Seher");
  const rSeer = players.find(p => p.alive && p.role === "Reactive Seer");
  const seerActive = seer || (rSeer && lastExecWasVillage);

  if (seer)  q.push({id:"seer",  label:"Seher",         icon:"🔮", fn: () => phase_Seer(seer)});
  else if (rSeer && lastExecWasVillage)
             q.push({id:"seer",  label:"Reactive Seer", icon:"⚡",  fn: () => phase_Seer(rSeer)});

  // Den Mother sieht direkt nach dem Seher ob ihre Wölfe gecheckt wurden
  const denM = players.find(p => p.alive && p.role === "Den Mother");
  if (denM && seerActive) q.push({id:"den_mother", label:"Den Mother", icon:"🐾", fn: () => phase_DenMother(denM)});

  // Devotee erfährt schrittweise Wolfnamen
  const dev = players.find(p => p.alive && p.role === "Devotee");
  if (dev) q.push({id:"devotee", label:"Devotee", icon:"📿", fn: () => phase_Devotee(dev)});

  // Empath prüft ob Nachbar des Sehers ein Wolf ist
  const emp = players.find(p => p.alive && p.role === "Empath");
  if (emp && seerActive) q.push({id:"empath", label:"Empath", icon:"💫", fn: () => phase_Empath(emp)});

  // Outcast-Effekt: wenn aktiv, dürfen Dorfrollen nicht agieren
  if (outcastDied) {
    q.push({id:"outcast_block", label:"⚠️ Outcast-Nacht", icon:"🚪", fn: () => {
      outcastDied = false;
      showModal("🚪","OUTCAST-EFFEKT","Dorfrollen blockiert!",
        `<div class="night-report-item nri-gold">🚪 Der Outcast ist gestorben!<br><br>Diese Nacht dürfen <b>alle Dorfrollen ihre Fähigkeiten nicht nutzen</b>.<br>Nur Werwölfe handeln normal.<br><br>Alle Dorfphasen werden übersprungen.</div>`,
        () => nextNightPhase()
      );
    }});
  } else {
    // Reviler: jede Nacht eine Person wählen (Dorf-Spezialrolle → stirbt, sonst Reviler stirbt)
    const reviler = players.find(p => p.alive && p.role === "Reviler");
    if (reviler) q.push({id:"reviler", label:"Reviler", icon:"😤", fn: () => phase_Reviler(reviler)});
    // Spy erfährt wen Seher geprüft hat
    const spy = players.find(p => p.alive && p.role === "Spy");
    if (spy) q.push({id:"spy", label:"Spy", icon:"🕵️", fn: () => phase_Spy(spy)});
  }

  // Oracle Wolf: aktiv sobald ein Wolf gestorben ist (Wolfrolle → nicht blockiert)
  const oracleWPlayer = players.find(p => p.alive && p.role === "Oracle Wolf");
  if (oracleWPlayer && oracleWolfActive) q.push({id:"oracle_wolf_night", label:"Oracle Wolf", icon:"🌕", fn: () => phase_OracleWolfNight(oracleWPlayer)});

  // Einmalige Info-Rollen (Oracle, Apprentice Exposer) – vor dem Angriff
  const oracleV = players.find(p => p.alive && p.role === "Oracle" && ri(p.role).team !== "wolf");
  if (oracleV && !oracleVillageUsed) q.push({id:"oracle_v", label:"Oracle", icon:"🌙", fn: () => phase_OracleVillage(oracleV)});
  const expo = players.find(p => p.alive && p.role === "Apprentice Exposer");
  if (expo && !exposerUsed) q.push({id:"exposer", label:"App. Exposer", icon:"📢", fn: () => phase_ApprenticeExposer(expo)});

  // Savant tötet ab Nacht 2 (kennt alle Rollen aus N1)
  const savant = players.find(p => p.alive && p.role === "Savant");
  if (savant && nightCount > 1) q.push({id:"savant", label:"Savant", icon:"🧠", fn: () => phase_Savant(savant)});

  // ══════════════════════════════════════════════════════════════
  // PHASE 3 – SCHUTZ: Bodyguard schützt bevor Wölfe angreifen
  // ══════════════════════════════════════════════════════════════
  if (!outcastDied) {
    const bg = players.find(p => p.alive && p.role === "Bodyguard");
    if (bg) q.push({id:"bodyguard", label:"Bodyguard", icon:"🛡️", fn: () => phase_Bodyguard(bg)});
  }

  // ══════════════════════════════════════════════════════════════
  // PHASE 4 – WOLF-VORBEREITUNG: Sorceress/Warlock suchen Seher,
  //           Mystic Wolf sieht Rollen – vor dem eigentlichen Kill
  // ══════════════════════════════════════════════════════════════
  const sorc = players.find(p => p.alive && p.role === "Sorceress");
  if (sorc) q.push({id:"sorceress", label:"Sorceress", icon:"🧙‍♀️", fn: () => phase_Sorceress(sorc)});
  const warlk = players.find(p => p.alive && p.role === "Warlock");
  if (warlk) q.push({id:"warlock", label:"Warlock", icon:"🧙‍♂️", fn: () => phase_Warlock(warlk)});
  const sorcW = players.find(p => p.alive && p.role === "Sorcerer Wolf");
  if (sorcW && !firstWolfDied) q.push({id:"sorcerer_wolf", label:"Sorcerer Wolf", icon:"🧙", fn: () => phase_SorcererWolf(sorcW)});
  const mystic = players.find(p => p.alive && p.role === "Mystic Wolf");
  if (mystic) q.push({id:"mystic", label:"Mystic Wolf", icon:"🔮", fn: () => phase_MysticWolf(mystic)});
  const appIll = players.find(p => p.alive && p.role === "Apprentice Illusionist");
  if (appIll && !apprenticeIllUsed) q.push({id:"apprentice_ill", label:"App. Illusionist", icon:"🎭", fn: () => phase_ApprenticeIllusionist(appIll)});

  // ══════════════════════════════════════════════════════════════
  // PHASE 5 – WOLF-ANGRIFF: Alle Wölfe wählen ihr Opfer
  // ══════════════════════════════════════════════════════════════
  q.push({id:"wolves", label:"Werwölfe", icon:"🐺", fn: () => phase_Wolves()});

  // ══════════════════════════════════════════════════════════════
  // PHASE 6 – REAKTION AUF ANGRIFF: Hexe weiß wer angegriffen
  //           wurde und kann heilen oder vergiften
  // ══════════════════════════════════════════════════════════════
  if (!outcastDied) {
    const witch = players.find(p => p.alive && (p.role === "Hexe" || p.role === "Witch"));
    if (witch && (witchHasHeal || witchHasPoison)) q.push({id:"witch", label:"Hexe", icon:"🧪", fn: () => phase_Witch(witch)});

    // Blighted ist aktiv nachdem er überlebt hat
    if (blightedActive) {
      const bl = players.find(p => p.alive && p.role === "Blighted");
      if (bl) q.push({id:"blighted", label:"Blighted", icon:"🤢", fn: () => phase_Blighted(bl)});
    }
  }

  // ══════════════════════════════════════════════════════════════
  // PHASE 7 – NEUTRALE KILLER: Töten unabhängig vom Wolf-Angriff
  // ══════════════════════════════════════════════════════════════
  const chupa = players.find(p => p.alive && p.role === "Chupacabra");
  if (chupa) q.push({id:"chupacabra", label:"Chupacabra", icon:"🦎", fn: () => phase_Chupacabra(chupa)});
  const aura = players.find(p => p.alive && p.role === "Auracabra");
  if (aura) q.push({id:"auracabra", label:"Auracabra", icon:"👁️", fn: () => phase_Auracabra(aura)});
  const van = players.find(p => p.alive && p.role === "Vanillacabra");
  if (van) q.push({id:"vanillacabra", label:"Vanillacabra", icon:"🦌", fn: () => phase_Vanillacabra(van)});
  // Blind Mary (nach eigenem Tod) tötet jede Nacht
  if (blindMaryDead) {
    const bm = players.find(p => !p.alive && p.role === "Blind Mary");
    if (bm) q.push({id:"blind_mary_kill", label:"Blind Mary", icon:"🙈", fn: () => phase_BlindMaryKill()});
  }

  // ══════════════════════════════════════════════════════════════
  // PHASE 8 – MANIPULATION & PASSIVE: Beeinflussen den nächsten
  //           Tag ohne direkt zu töten
  // ══════════════════════════════════════════════════════════════
  if (!outcastDied) {
    const spell = players.find(p => p.alive && p.role === "Spellcaster");
    if (spell) q.push({id:"spellcaster", label:"Spellcaster", icon:"✨", fn: () => phase_Spellcaster(spell)});
  }
  const mum = players.find(p => p.alive && p.role === "Mummer");
  if (mum) q.push({id:"mummer", label:"Mummer", icon:"🎪", fn: () => phase_Mummer(mum)});
  const nosf = players.find(p => p.alive && p.role === "Nosferatu");
  if (nosf) q.push({id:"nosferatu", label:"Nosferatu", icon:"🧛", fn: () => phase_Nosferatu(nosf)});
  const mm = players.find(p => p.alive && p.role === "Matchmaker");
  if (mm) q.push({id:"matchmaker", label:"Matchmaker", icon:"💘", fn: () => phase_Matchmaker(mm)});

  // ══════════════════════════════════════════════════════════════
  // PHASE 9 – BEOBACHTUNG & EINMALIG: Rollen die das Ergebnis
  //           der Nacht beobachten oder einmalig handeln
  // ══════════════════════════════════════════════════════════════
  if (!outcastDied) {
    const reani = players.find(p => p.alive && p.role === "Reanimator");
    if (reani && !reanimatorUsed) q.push({id:"reanimator", label:"Reanimator", icon:"💉", fn: () => phase_Reanimator(reani)});
    // Gladys beobachtet ob ein Nachbar aktiv war (ganz am Ende wenn alle Aktionen bekannt)
    const gladys = players.find(p => p.alive && p.role === "Gladys");
    if (gladys) q.push({id:"gladys", label:"Gladys", icon:"🪟", fn: () => phase_Gladys(gladys)});
  }
  // The Cloak ist jetzt eine passive Wolfrolle – keine Enthüllung nötig
  if (false && !cloakRevealed && nightCount >= cloakRevealNight) {
    const cloak = players.find(p => p.alive && p.role === "The Cloak");
    if (cloak) q.push({id:"cloak_reveal", label:"The Cloak", icon:"🧥", fn: () => phase_CloakReveal(cloak)});
  }

  return q;
}
 
function nextNightPhase() {
  nightQueueDone.push(nightQueueDone.length);
  updateNightBar();
  const idx = nightQueueDone.length;
  if (idx >= nightQueue.length) {
    processNightEnd();
    return;
  }
  setTimeout(() => nightQueue[idx].fn(), 200);
}
 
/* ============================================================
   NIGHT CYCLE – START
============================================================ */
function startNightCycle() {
  gamePhase = "night";
  victimThisNight = null;
  secondVictimThisNight = null;
  witchKilledThisNight = null;
  nightKillCount = 0;
  nightQueueDone = [];
  outsiderNightVictim = null;
  bodyguardTarget = null;
  spellcastedToday = null;
  mummerHypnotized = null;
  blackCatNightKill = false;
 
  maxNightKills = wolfCubDied ? 2 : 1;
  wolfCubDied = false;
  // Starving Wolf: last wolf → 2 kills
  const aliveWolves = players.filter(p => p.alive && isWolf(p));
  if (aliveWolves.length === 1 && aliveWolves[0].role === "Starving Wolf") maxNightKills = 2;
 
  document.body.className = "night";
  document.getElementById("phaseIcon").textContent = "🌙";
  document.getElementById("phaseText").textContent = "Nacht " + nightCount;
  document.getElementById("voteSection").style.display = "none";
  document.getElementById("dayActions").style.display = "none";
  document.getElementById("confirmBanner").style.display = "none";
  clearVotes();
  updateTopBar();
 
  nightQueue = buildNightQueue();
  updateNightBar();

  // Master Tanner Phase 2 activation
  if (!masterTannerActivated && nightCount >= 4) {
    const mt = players.find(p => p.alive && p.role === "Master Tanner");
    if (mt) {
      masterTannerActivated = true;
      log(`🪦 Master Tanner ${mt.name}: Phase 2 aktiv – muss jetzt gehängt werden!`, "action");
    }
  }
 
  if (nightQueue.length === 0) {
    processNightEnd();
    return;
  }
  // Anfänger-Tipp: Nacht beginnt (nur in Nacht 1)
  if (nightCount === 1) {
    showBeginnerTip("night_start", () => setTimeout(() => nightQueue[0].fn(), 200));
  } else {
    setTimeout(() => nightQueue[0].fn(), 300);
  }
}

  showModal("🌲","OUTSIDER WOLF","Jagt alleine – Nacht 1",
    `<div class="night-report-item nri-info">🌲 <b>${outsider.name}</b> ist der Outsider Wolf.<br><br>Er wacht <b>NICHT</b> mit dem Rudel auf und kennt die Wölfe nicht – sie kennen ihn nicht.<br><br>⚠️ Er jagt <b>jede Nacht alleine</b> und wählt sein eigenes Opfer.<br>👉 Sie erkennen sich erst, wenn einer den anderen angreifen würde:<br>• Outsider wählt einen Wolf → Erkennung, kein Tod, er tritt bei.<br>• Wölfe wählen Outsider → Erkennung, er überlebt, er tritt bei.</div>`,
    () => nextNightPhase()
  );
}

function phase_BlindMaryAlive(bm) {
  showModal("🙈","BLIND MARY","Sie lebt – darf nicht sprechen",
    `<div class="night-report-item nri-info">🙈 <b>${bm.name}</b> (Blind Mary) lebt.<br><br>⚠️ Sie darf weder sprechen noch gestikulieren – weder tagsüber noch nachts.<br><br>🏆 Gewinnt sofort, wenn eine Phase (Tag oder Nacht) endet, ohne dass jemand eliminiert wurde.<br><br>Nach ihrem Tod darf sie jede Nacht jemanden töten.</div>`,
    () => nextNightPhase()
  );
}

function phase_OutsiderWolfHunt(outsider) {

  const alivePlayers = players.filter(p => p.alive);

  const leftNeighbor  = idx > 0 ? alivePlayers[idx - 1] : alivePlayers[alivePlayers.length - 1];
  const rightNeighbor = idx < alivePlayers.length - 1 ? alivePlayers[idx + 1] : alivePlayers[0];
  showModal("😴","INSOMNIAC",`Nacht ${nightCount} – Nachbar-Aktivität`,
    `<div class="night-report-item nri-info">😴 <b>${ins.name}</b> wartet auf das Spielleiter-Signal:<br><br>

function _phase_Wolves() {
  // Spawn schläft bis alle echten Wölfe tot sind
  const spawnP = players.find(p => p.alive && p.role === "Spawn");
  const otherWolvesAlive = players.filter(p => p.alive && isWolf(p) && p.role !== "Spawn").length;
  const spawnAwake = spawnP && otherWolvesAlive === 0; // Spawn nur aktiv wenn alle anderen Wölfe tot

  // Outsider Wolf schläft bis firstWolfDied
  const outsiderP = players.find(p => p.alive && p.role === "Outsider Wolf");
  const outsiderAwake = outsiderP && outsiderWolfJoined;

  // Alle Wölfe die diese Nacht wach sind
  const allWolves = players.filter(p => {
    if (!p.alive || !isWolf(p)) return false;
    if (p.role === "Spawn" && !spawnAwake) return false;
    if (p.role === "Outsider Wolf" && !outsiderAwake) return false;
    return true;
  });

  if (allWolves.length === 0) { nextNightPhase(); return; }

  // Infected penalty: wolves skipped this night
  if (infectedKilledByWolves) {
    infectedKilledByWolves = false;
    log("🦠 Strafnacht! Wölfe dürfen diese Nacht niemanden angreifen (Infected-Strafe).", "action");
    showModal("🦠","STRAFNACHT","Wölfe können nicht angreifen!",
      `<div class="night-report-item nri-info">🦠 Die Wölfe haben den <b>Infected</b> getötet! Als Strafe dürfen sie diese Nacht <b>NIEMANDEN</b> angreifen.<br><br>Wölfe: ${allWolves.map(p=>p.name).join(", ")}<br><br>Diese Nacht gibt es kein Wolfsopfer.</div>`,
      () => nextNightPhase()
    );
    return;
  }

  // Sonderhinweise für bestimmte Wolfrollen
  const hints = [];
  if (allWolves.find(p => p.role === "Kamikaze Wolf")) hints.push("💥 Kamikaze Wolf: Seher-Check = beide tot");
  if (allWolves.find(p => p.role === "Mystery Wolf")) hints.push("❓ Mystery Wolf: erstellt Lycan in N2 & N3");
  if (allWolves.find(p => p.role === "Pet Wolf")) {
    hints.push(`🦴 Pet Wolf: Besitzer = ${petWolfOwner || "?"} – stirbt Pet Wolf zuerst, stirbt Besitzer mit!`);
  }
  if (allWolves.find(p => p.role === "Wolf Cub")) hints.push("🐶 Wolf Cub: Tod = nächste Nacht 2×");
  if (allWolves.find(p => p.role === "Starving Wolf") && allWolves.length === 1) hints.push("🐺 Starving Wolf: allein = 2 Opfer heute!");
  if (allWolves.find(p => p.role === "Eye of the Seer")) hints.push("👁️ Eye of the Seer: Tod = Seher invertiert");
  if (allWolves.find(p => p.role === "Illusionist")) hints.push("🪄 Illusionist: Seher-Check = Dauerinversion");
  if (allWolves.find(p => p.role === "Assassin Wolf")) hints.push("🗡️ Assassin Wolf: Hinrichtung = zieht jemanden mit");
  if (spawnAwake) hints.push("🥚 Spawn: wacht erstmals auf!");

  const hintHtml = hints.length > 0
    ? `<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:4px 0">${hints.map(h=>`<span style="background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);border-radius:8px;padding:4px 10px;font-size:.82rem;">${h}</span>`).join("")}</div>`
    : "";

  const label = maxNightKills > 1 ? `Wählt ${maxNightKills} Opfer!` : "Wählt ein Opfer.";
  setInstruction(`🐺 Werwölfe – Nacht ${nightCount}`,
    `Wölfe: ${allWolves.map(p=>p.name).join(", ")}. ${label}`,
    "wolf", "Wolfsteam"
  );

  if (hints.length > 0) {
    showModal("🐺","WOLFTEAM",`Nacht ${nightCount} – Hinweise`,
      hintHtml,
      () => {
        nightKillCount = 0;
        const targets = players.filter(p => p.alive && !isWolf(p));
        if (targets.length === 0) { nextNightPhase(); return; }
        renderGrid(targets, (p) => wolfKill(p, targets));
      }
    );
    return;
  }

  nightKillCount = 0;
  const targets = players.filter(p => p.alive && !isWolf(p));
  if (targets.length === 0) { nextNightPhase(); return; }
  renderGrid(targets, (p) => wolfKill(p, targets));
}
 
function wolfKill(p, allTargets) {
  showConfirmBanner(`🐺 ${p.name} als Opfer wählen?`, () => {
    // Bodyguard protection → nobody dies, no re-selection
    if (bodyguardTarget === p.name) {
      log(`🛡️ ${p.name} geschützt – das Dorf hat Glück!`, "action");
      showModal("🛡️","BODYGUARD","Das Dorf hat Glück!",
        `<div class="night-report-item nri-safe">🛡️ <b>${p.name}</b> ist durch den Bodyguard geschützt!<br><br>☀️ <b>Das Dorf hat Glück – heute Nacht stirbt niemand!</b></div>`,
        () => nextNightPhase()
      );
      return;
    }

    if (nightKillCount === 0) {
      victimThisNight = p.name;
    } else {
      secondVictimThisNight = p.name;
    }
    nightKillCount++;
    log(`🐺 Wölfe wählen: ${p.name}`, "action");

    // Gemini: sofort Hinweis dass Zwilling stirbt
    const twin = p.role === "Gemini"
      ? players.find(x => x.alive && x.role === "Gemini" && x.name !== p.name)
      : null;

    if (nightKillCount < maxNightKills) {
      const remaining = players.filter(x => x.alive && !isWolf(x) && x.name !== victimThisNight);
      if (remaining.length > 0) {
        const afterFirst = () => {
          setInstruction("🐺 Werwölfe – 2. Opfer", "Wählt ein zweites Opfer.", "wolf", "Wolfsteam");
          renderGrid(remaining, (q) => {
            showConfirmBanner(`🐺 ${q.name} als 2. Opfer?`, () => {
              if (bodyguardTarget === q.name) {
                log(`🛡️ 2. Opfer ${q.name} geschützt – kein zweiter Kill`, "action");
                nightKillCount++;
                nextNightPhase();
                return;
              }
              secondVictimThisNight = q.name;
              nightKillCount++;
              log(`🐺 Wölfe wählen 2. Opfer: ${q.name}`, "action");
              nextNightPhase();
            });
          });
        };
        if (twin) {
          showModal("♊","GEMINI","Zwilling stirbt mit!",
            `<div class="night-report-item nri-death">♊ Achtung: <b>${p.name}</b> ist Gemini – sein Zwilling <b>${twin.name}</b> stirbt heute Nacht ebenfalls mit!</div>`,
            afterFirst
          );
        } else {
          afterFirst();
        }
        return;
      }
    }

    if (twin) {
      showModal("♊","GEMINI","Zwilling stirbt mit!",
        `<div class="night-report-item nri-death">♊ Achtung: <b>${p.name}</b> ist Gemini – sein Zwilling <b>${twin.name}</b> stirbt heute Nacht ebenfalls mit!</div>`,
        () => nextNightPhase()
      );
    } else {
      nextNightPhase();
    }
  });
}

function seerCheck(seer, target) {
  let actuallyWolf = isWolf(target) || (target.isLycan);
  let showAsWolf = actuallyWolf;
 
  // Pet Wolf: no seer disguise – appears as wolf like any other wolf
  // Mystery Wolf: no longer disguised - appears normally as wolf
  // The Cloak: protects direct wolf neighbors - appears as village
  const cloakPlayer = players.find(p => p.alive && p.role === "The Cloak");
  if (cloakPlayer && showAsWolf) {
    const alivePlayers = players.filter(p => p.alive);
    const cloakIdx = alivePlayers.findIndex(p => p.name === cloakPlayer.name);
    const leftNeighbor  = cloakIdx > 0 ? alivePlayers[cloakIdx - 1] : alivePlayers[alivePlayers.length - 1];
    const rightNeighbor = cloakIdx < alivePlayers.length - 1 ? alivePlayers[cloakIdx + 1] : alivePlayers[0];
    if (target.name === leftNeighbor.name || target.name === rightNeighbor.name) {
      showAsWolf = false;
      log(`🧥 The Cloak schützt Nachbar ${target.name} – erscheint als Dorfbewohner`, "action");
    }
  }
  // Spawn: shows as village while other wolves alive
  if (target.role === "Spawn") {
    const otherWolves = players.filter(p => p.alive && isWolf(p) && p.role !== "Spawn").length;
    if (otherWolves > 0) showAsWolf = false;
  }
  // Outsider Wolf: shows as village until he joins the pack
  if (target.role === "Outsider Wolf" && !outsiderWolfJoined) showAsWolf = false;
 
  // Apprentice Illusionist: inverts result only for their chosen target
  if (apprenticeIllTarget && target.name === apprenticeIllTarget && !apprenticeIllUsed) {
    apprenticeIllUsed = true;
    apprenticeIllTarget = null;
    showAsWolf = !showAsWolf;
    log(`🎭 Apprentice Illusionist: Seherergebnis für ${target.name} invertiert!`, "action");
  }
 
  // Kamikaze Wolf: both die
  if (target.role === "Kamikaze Wolf") {
    target.alive = false;
    seer.alive = false;
    log(`💥 Kamikaze Wolf! ${seer.name} und ${target.name} sterben beide!`, "death");
    showModal("💥","KAMIKAZE WOLF","Beide sterben!",
      `<div class="night-report-item nri-death">💥 Der Seher <b>${seer.name}</b> hat den Kamikaze Wolf <b>${target.name}</b> geprüft. BEIDE sterben sofort!</div>`,
      () => { updateTopBar(); nextNightPhase(); }
    );
    return;
  }
 
  // Illusionist: seer gets inverted from now on
  if (target.role === "Illusionist" && !seerInverted) {
    seerInverted = true;
    log(`🪄 Illusionist gefunden – Seher bekommt ab jetzt invertierte Ergebnisse!`, "action");
  }
 
  // Apply inversion
  if (seerInverted) showAsWolf = !showAsWolf;
 
  // Innocent: special signal
  if (target.role === "Innocent" && !seerInverted) {
    log(`😇 Seher prüft Innocent ${target.name} – spezielles Zeichen!`, "action");
    showModal("🔮","SEHER","Ergebnis",
      `<div class="night-report-item nri-safe">😇 SPEZIELL: <b>${target.name}</b> ist der INNOCENT – absolut unschuldig und nicht verfälschbar!</div>`,
      () => nextNightPhase()
    );
    return;
  }
 
  const result = showAsWolf ? "🐺 WERWOLF" : "✅ Kein Werwolf";
  const cls = showAsWolf ? "nri-death" : "nri-safe";
  log(`🔮 Seher prüft ${target.name} → ${result}${seerInverted ? " (invertiert!)" : ""}`, "action");
  showModal("🔮","SEHER",`${target.name} ist…`,
    `<div class="night-report-item ${cls}">${result}${seerInverted ? " <em>(Seher ist verflucht – möglicherweise falsch!)</em>" : ""}</div>`,
    () => nextNightPhase()
  );
}
